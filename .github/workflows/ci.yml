name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Preen.xcodeproj \
            -scheme Preen

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project Preen.xcodeproj \
            -scheme Preen \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log

      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -project Preen.xcodeproj \
            -scheme Preen \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee test.log
